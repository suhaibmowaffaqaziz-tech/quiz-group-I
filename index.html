<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار اضطرابات الايض العملي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="timer" style="display:none;">20:00</div>

    <div id="quiz-container">
        <div id="login">
            <h2 style="font-size: 26px; margin-bottom: 25px;">اختبار اضطرابات الايض العملي</h2>
            <input type="text" id="name" placeholder="الاسم الكامل بالعربية">
            <input type="text" id="group" placeholder="الشعبة">
            <button class="start-btn" onclick="startQuiz()">بدء الاختبار</button>
        </div>

        <div id="quiz" style="display:none;">
            <h2 id="qText" style="direction: ltr; text-align: left; font-size: 22px;"></h2>
            <div id="options" style="direction: ltr;"></div>
            <button id="manual-finish" onclick="confirmEnd()" style="background:#dc3545; color:white; border:none; padding:12px; margin-top:25px; border-radius:8px; cursor:pointer; width: 100%;">إنهاء الاختبار وتسليم الإجابات</button>
        </div>

        <div id="result-screen" style="display:none;">
            <h2 id="res-message" style="color: #007bff;">جاري إرسال الدرجة...</h2>
            <p style="font-size: 20px;">درجتك النهائية هي:</p>
            <h1 id="score-display" style="font-size: 70px; color: #28a745; margin: 20px 0;"></h1>
            <p style="color: #666;">من إجمالي: 10 درجات</p>
            <p id="save-status" style="font-size: 16px; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        let currentQ = 0;
        let correctCount = 0;
        let timeLeft = 1200; // 20 دقيقة
        let timerInterval;

        // الرابط الجديد الذي زودتني به
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbw1_O5u-WooBsRSfQpwAK7nZSP78tpShNk5tUnCHYA5ByULvRpsx7BNWbjt05w4Lubd/exec"; 

        function startQuiz() {
            const name = document.getElementById('name').value;
            const group = document.getElementById('group').value;
            const arabicRegex = /^[\u0621-\u064A\s]+$/;

            if(!name || !group) { alert("يرجى إدخال الاسم والشعبة"); return; }
            if(!arabicRegex.test(name)) { alert("يرجى كتابة الاسم باللغة العربية حصراً"); return; }

            document.getElementById('login').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            document.getElementById('timer').style.display = 'block';
            startTimer();
            showQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
                if (timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
                timeLeft--;
            }, 1000);
        }

        function showQuestion() {
            const qData = questions[currentQ];
            document.getElementById('qText').innerText = `Q${currentQ + 1}: ${qData.q}`;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            qData.o.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => { 
                    if(index === qData.a) correctCount++; 
                    currentQ++; 
                    if(currentQ < questions.length) showQuestion(); 
                    else finishQuiz(); 
                };
                optDiv.appendChild(btn);
            });
        }

        function confirmEnd() { if(confirm("هل أنت متأكد من إنهاء الاختبار وتسليم إجاباتك؟")) finishQuiz(); }

        function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            let finalGrade = correctCount * 0.5;
            document.getElementById('score-display').innerText = finalGrade + " / 10";

            sendDataToGoogle(document.getElementById('name').value, document.getElementById('group').value, finalGrade);
        }

        function sendDataToGoogle(name, group, score) {
            document.getElementById('save-status').innerText = "جاري حفظ الدرجة في سجلات المدرس...";
            
            const data = { 
                name: name, 
                group: group, 
                score: score 
            };

            fetch(GOOGLE_SHEET_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }).then(() => {
                document.getElementById('res-message').innerText = "تم التسليم بنجاح";
                document.getElementById('save-status').innerText = "✅ تم تسجيل حضورك ودرجتك (" + score + ") بنجاح.";
            }).catch(err => {
                document.getElementById('save-status').innerText = "⚠️ حدث خطأ في الاتصال، يرجى تصوير الشاشة وإرسالها للمدرس.";
            });
        }
    </script>
</body>
</html>
